services:
  mesh-worker:
    build:
      context: ./services/mesh-worker
    ports:
      - "8000:8000"
    restart: unless-stopped
    environment:
      LOG_LEVEL: DEBUG
    mem_limit: 6g
    healthcheck:
      test: ["CMD", "/app/scripts/healthcheck.sh"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 90s

  web:
    build:
      context: ./apps/web
    ports:
      - "3000:3000"
    restart: unless-stopped
    environment:
      MESH_WORKER_URL: http://mesh-worker:8000
    depends_on:
      mesh-worker:
        condition: service_healthy
