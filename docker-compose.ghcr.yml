services:
  mesh-worker:
    image: ghcr.io/calebneuf/chief-architect-house-miniatures-mesh-worker:latest
    pull_policy: always
    restart: unless-stopped
    environment:
      LOG_LEVEL: DEBUG
    healthcheck:
      test: ["CMD", "/app/scripts/healthcheck.sh"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 90s

  web:
    image: ghcr.io/calebneuf/chief-architect-house-miniatures-web:latest
    pull_policy: always
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      MESH_WORKER_URL: http://mesh-worker:8000
    depends_on:
      mesh-worker:
        condition: service_healthy
